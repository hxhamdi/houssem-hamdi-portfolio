name: portfolio_website
description: "Portfolio website for Elhamdi Mohamed Houssem"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  url_launcher: ^6.1.11
  font_awesome_flutter: ^10.4.0
  animated_text_kit: ^4.2.2
  go_router: ^13.0.0
  responsive_framework: ^1.1.0
  flutter_animate: ^4.2.0
  firebase_core: ^2.24.0
  cloud_firestore: ^4.15.0
  equatable: ^2.0.5
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/